---
name: Deploy

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions: {}

jobs:
  ci:
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    uses: erik73/workflows/.github/workflows/app-ci.yaml@3bd4082539091854a3efb431d545f6b01399589a # v1.0.11

  deploy:
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: erik73/workflows/.github/workflows/app-deploy.yaml@3bd4082539091854a3efb431d545f6b01399589a # v1.0.11
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
